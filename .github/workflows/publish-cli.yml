name: Publish CLI to npm

# Release-driven publish. Fires when a GitHub Release is published.
# Expected tag format: `cli-vX.Y.Z` matching cli/package.json#version.
# Target registry: npmjs.com (public). Provenance attestation enabled.
#
# Operator flow:
#   1. PR bumps cli/package.json version → merges to main.
#   2. GitHub UI → Releases → "Draft a new release".
#   3. Create tag `cli-v<version>` (must match package.json).
#   4. Publish release → this workflow fires.
#
# Idempotency: npm will reject a duplicate version with a clear error.
# Safety: the workflow validates AXIS gates AND verifies the tag matches
# the package.json version before publishing.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: PRD   # NPM_TOKEN lives in the PRD environment
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Validate AXIS (gate before publish)
        working-directory: .
        run: bash scripts/validate-axis.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${{ github.event.release.tag_name }}"
          EXPECTED="cli-v${PKG_VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag '$TAG' does not match expected '$EXPECTED' (from cli/package.json)."
            echo "::error::Either bump cli/package.json#version to match the tag, or recreate the release with the correct tag."
            exit 1
          fi
          echo "::notice::Publishing @axis-bootstrap/cli@${PKG_VERSION}"

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
