name: Validate AXIS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (preserve symlinks)
        uses: actions/checkout@v4

      - name: Run AXIS validators
        run: bash scripts/validate-axis.sh
